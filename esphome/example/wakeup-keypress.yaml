# Target YAML once the usb_hid_wakeup component is implemented.
# This file is a SPEC, not working code (the component doesn't exist yet).
#
# Once implemented, compile with:
#   esphome run esphome/example/wakeup-keypress.yaml

esphome:
  name: esp-wakeup
  friendly_name: ESP Wakeup Keypress

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf            # required: TinyUSB is not available on Arduino-S3
    version: latest

# Standard ESPHome housekeeping ----------------------------------------------

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP-Wakeup Setup"  # captive portal fallback, built-in to ESPHome

captive_portal:

logger:
  # On S3 with TinyUSB claiming USB OTG, point logger at UART0 (CH343)
  # if the board has one. Otherwise leave default but expect no USB-CDC logs
  # once the firmware boots.
  hardware_uart: UART0
  baud_rate: 115200

api:                          # native ESPHome API → HA discovers auto
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# Our custom component -------------------------------------------------------

external_components:
  - source: github://jbjardine/esp32-usb-VoWiFi
    components: [usb_hid_wakeup]
    refresh: 0s

usb_hid_wakeup:
  id: kbd
  # Optional — defaults shown. keyboard_layout matters for force_shutdown typing.
  vid: 0x303A
  pid: 0x4004
  manufacturer: "ESP"
  product: "Wakeup Keyboard Device"
  serial: "123456"
  keyboard_layout: azerty   # azerty | us  (target host's Windows layout)

button:
  - platform: usb_hid_wakeup
    type: wakeup
    name: "Wakeup PC"
    usb_hid_wakeup_id: kbd
    icon: mdi:power

  # SAFE diagnostic: open Notepad on the host, focus it, press this — it types
  # "shutdown /s /f /t 0" with NO execution. Verify the text is exact (w / 0)
  # before trusting the force_shutdown button below. Remove once validated.
  - platform: usb_hid_wakeup
    type: type_test
    name: "Type test (Notepad)"
    usb_hid_wakeup_id: kbd
    icon: mdi:keyboard

  # DANGEROUS: forces a Windows shutdown (closes apps without saving).
  # Recommend a confirmation dialog on the HA card (tap_action: confirmation).
  - platform: usb_hid_wakeup
    type: force_shutdown
    name: "Force shutdown PC"
    usb_hid_wakeup_id: kbd
    icon: mdi:power-plug-off

binary_sensor:
  - platform: usb_hid_wakeup
    type: mounted
    name: "USB connected to host"
    usb_hid_wakeup_id: kbd
    device_class: connectivity

  - platform: usb_hid_wakeup
    type: suspended
    name: "PC asleep"
    usb_hid_wakeup_id: kbd
